name: vmeste

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vmeste
      POSTGRES_USER: vmeste_user
      POSTGRES_PASSWORD: vmeste_pass
    volumes:
      - vmeste_pgdata:/var/lib/postgresql/data
    ports:
      # Avoid clash with a local Windows PostgreSQL on 5432; host tools use 5433.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmeste_user -d vmeste"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - web

volumes:
  vmeste_pgdata:
